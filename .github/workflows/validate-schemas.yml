name: Validate

# Workflow only reads the repo — never grant the default write token.
permissions:
  contents: read

on:
  pull_request:
    paths:
      - "schemas/**"
      - "examples/**/docs/pipeline-map.json"
      - "examples/**/docs/ExplainPanel.html"
      - "skills/**"
      - ".claude-plugin/**"
      - "package.json"
      - "docs/install.md"
      - "docs/media/demo.html"
      - ".github/workflows/validate-schemas.yml"
  push:
    branches: [main]

jobs:
  schema:
    name: Pipeline-map schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Validate schema syntax
        run: npx -y ajv-cli@5.0.0 compile --spec=draft2020 -s schemas/pipeline-map.schema.json

      - name: Validate all example maps
        run: |
          set -e
          for map in examples/*/docs/pipeline-map.json ; do
            echo "→ $map"
            npx -y ajv-cli@5.0.0 validate --spec=draft2020 -s schemas/pipeline-map.schema.json -d "$map"
          done

      - name: Examples declare current schema version
        run: |
          set -e
          SCHEMA_CONST=$(jq -r '.properties.schemaVersion.const' schemas/pipeline-map.schema.json)
          echo "Schema declares version: $SCHEMA_CONST"
          for map in examples/*/docs/pipeline-map.json ; do
            DECLARED=$(jq -r '.schemaVersion' "$map")
            if [ "$SCHEMA_CONST" != "$DECLARED" ] ; then
              echo "::error file=$map::schemaVersion mismatch — schema says $SCHEMA_CONST, map says $DECLARED"
              exit 1
            fi
          done

  plugin:
    name: Plugin + marketplace manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Plugin and marketplace JSON parse
        run: |
          jq -e 'has("name") and has("version") and has("description")' .claude-plugin/plugin.json
          jq -e 'has("name") and has("owner") and (.plugins | length > 0)' .claude-plugin/marketplace.json

      - name: Plugin version is SemVer
        run: |
          V=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "$V" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-+.][0-9A-Za-z.-]+)?$' \
            || (echo "Not SemVer: $V" && exit 1)

      - name: Plugin and marketplace agree on plugin version
        run: |
          PV=$(jq -r '.version' .claude-plugin/plugin.json)
          MV=$(jq -r '.plugins[] | select(.name=="docpanel") | .version' .claude-plugin/marketplace.json)
          if [ "$PV" != "$MV" ] ; then
            echo "::error::plugin.json version ($PV) ≠ marketplace.json plugin entry version ($MV)"
            exit 1
          fi

      - name: package.json version tracks plugin.json version
        run: |
          PV=$(jq -r '.version' .claude-plugin/plugin.json)
          NV=$(jq -r '.version' package.json)
          if [ "$PV" != "$NV" ] ; then
            echo "::error::plugin.json version ($PV) ≠ package.json version ($NV)"
            exit 1
          fi

      - name: docs/install.md cites the current plugin version
        # install.md mentions the version literal in prose; CI keeps it from going stale.
        run: |
          PV=$(jq -r '.version' .claude-plugin/plugin.json)
          if ! grep -q "currently \`$PV\`" docs/install.md ; then
            echo "::error file=docs/install.md::install.md cites a stale plugin version (expected \`$PV\`)"
            exit 1
          fi

  templates:
    name: HTML template + demo syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Strip skill-template comments, then parse the HTML standalone template
        # The {{! ... }} block is the kit's own placeholder-doc syntax; strip it
        # before parsing. Then run html.parser to surface unclosed tags / bad escapes.
        # Also asserts the four required placeholders are present.
        run: |
          python3 - <<'PY'
          import re, pathlib, sys
          from html.parser import HTMLParser

          class Strict(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.errs = []
              def error(self, msg):
                  self.errs.append(msg)

          tpl_path = pathlib.Path("skills/explain-panel/references/html-standalone.html.template")
          tpl = tpl_path.read_text()
          stripped = re.sub(r"\{\{!.*?\}\}", "", tpl, flags=re.S)
          # Also strip the bare {{ NAME }} placeholders so parser doesn't trip on them in attrs
          stripped = re.sub(r"\{\{\s*[A-Z_]+\s*\}\}", "PLACEHOLDER", stripped)
          p = Strict()
          p.feed(stripped)
          p.close()
          if p.errs:
              print("HTML parser errors:", p.errs); sys.exit(1)

          required = ["{{ ICON }}", "{{ HEADER_TITLE }}", "{{ GROUP_SECTIONS_BLOCKS }}", "{{ LANG }}", "{{ FOOTER_NOTE_BLOCK }}"]
          missing = [r for r in required if r not in tpl]
          if missing:
              print("Template missing placeholders:", missing); sys.exit(1)

          # Every {{ NAME }} placeholder in the template body must also be documented
          # in the leading {{! ... }} doc block. Catches doc/body drift early.
          # The doc block opens with "{{!" and closes with "}}" alone on its own line —
          # this lets the doc body itself contain literal "{{ NAME }}" examples
          # without prematurely terminating the comment.
          doc_match = re.search(r"\{\{!(.*?)^\}\}\s*$", tpl, flags=re.S | re.M)
          if not doc_match:
              print("Template missing leading {{! ... }} doc block"); sys.exit(1)
          doc_block = doc_match.group(1)
          body = tpl[doc_match.end():]
          body_placeholders = set(re.findall(r"\{\{\s*([A-Z_]+)\s*\}\}", body))
          doc_placeholders = set(re.findall(r"\{\{\s*([A-Z_]+)\s*\}\}", doc_block))
          undocumented = body_placeholders - doc_placeholders
          if undocumented:
              print("Template uses placeholders not documented in doc block:", sorted(undocumented)); sys.exit(1)

          print("HTML standalone template OK")
          PY

      - name: docs/media/demo.html parses
        run: |
          python3 - <<'PY'
          import pathlib, sys
          from html.parser import HTMLParser
          class Strict(HTMLParser):
              def __init__(self):
                  super().__init__(); self.errs = []
              def error(self, msg): self.errs.append(msg)
          p = Strict()
          p.feed(pathlib.Path("docs/media/demo.html").read_text())
          p.close()
          if p.errs:
              print(p.errs); sys.exit(1)
          print("demo.html parses OK")
          PY

      - name: python-cli example HTML matches the live demo
        # README claims examples/python-cli/docs/ExplainPanel.html is the exact file
        # embedded as the live demo. Enforce that invariant — if either copy drifts,
        # one of them is wrong, and a contributor needs to refresh the other.
        run: |
          if ! diff -q examples/python-cli/docs/ExplainPanel.html docs/media/demo.html > /dev/null ; then
            echo "::error::examples/python-cli/docs/ExplainPanel.html diverged from docs/media/demo.html. Re-sync both."
            diff -u examples/python-cli/docs/ExplainPanel.html docs/media/demo.html | head -80
            exit 1
          fi
          echo "python-cli HTML ≡ demo.html OK"

  components:
    name: Example components compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Type-check React example components
        # CONTRIBUTING.md rule 3 says "templates compile" — this enforces it on the
        # checked-in example components. Components are copied next to node_modules
        # because tsc resolves imports from the file's own directory upward.
        run: |
          set -e
          mkdir -p /tmp/tsxcheck && cd /tmp/tsxcheck
          npm init -y > /dev/null
          npm install --no-save --silent react@18 react-dom@18 @types/react@18 @types/react-dom@18 react-syntax-highlighter@15 @types/react-syntax-highlighter@15 typescript@5
          cp "$GITHUB_WORKSPACE/examples/fastapi-rag/components/ExplainPanel.tsx" FastapiPanel.tsx
          cp "$GITHUB_WORKSPACE/examples/nextjs-app/components/ExplainPanel.tsx" NextjsPanel.tsx
          npx tsc --noEmit --jsx react-jsx --module esnext --moduleResolution bundler --target es2020 --skipLibCheck FastapiPanel.tsx NextjsPanel.tsx
          echo "React example components type-check OK"

      - name: Type-check Vue example component
        run: |
          set -e
          mkdir -p /tmp/vuecheck && cd /tmp/vuecheck
          npm init -y > /dev/null
          npm install --no-save --silent vue@3 shiki@1 vue-tsc@2 typescript@5
          cp "$GITHUB_WORKSPACE/examples/nuxt-app/components/ExplainPanel.vue" "$GITHUB_WORKSPACE/examples/nuxt-app/components/ExplainPanel.css" .
          printf '%s\n' '{ "compilerOptions": { "module": "esnext", "moduleResolution": "bundler", "target": "es2020", "skipLibCheck": true, "noEmit": true, "jsx": "preserve", "strict": false }, "include": ["ExplainPanel.vue"] }' > tsconfig.json
          npx vue-tsc --noEmit -p tsconfig.json
          echo "Vue example component type-checks OK"
